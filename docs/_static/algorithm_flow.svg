<svg xmlns="http://www.w3.org/2000/svg" width="940" height="600" viewBox="0 0 940 600" role="img" aria-labelledby="title desc">
  <title id="title">Polygon rasterization decision flow</title>
  <desc id="desc">Flow chart showing the exact path for small polygon bounding boxes and the hybrid path for large bounding boxes.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="940" height="600" fill="#f8fafc"/>
  <text x="470" y="46" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="28" font-weight="700" fill="#0f172a">
    Polygon Rasterization Strategy
  </text>

  <rect x="315" y="80" width="310" height="76" rx="18" fill="#e2e8f0" stroke="#64748b" stroke-width="2"/>
  <text x="470" y="114" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="22" font-weight="700" fill="#0f172a">
    Polygon bbox on target grid
  </text>
  <text x="470" y="139" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#334155">
    count candidate cells in the bbox
  </text>

  <path d="M470 156 L470 188" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>

  <polygon points="470,188 610,260 470,332 330,260" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="470" y="246" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="21" font-weight="700" fill="#7c2d12">
    bbox cell count
  </text>
  <text x="470" y="272" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="21" font-weight="700" fill="#7c2d12">
    &lt;= threshold?
  </text>
  <text x="470" y="298" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="16" fill="#92400e">
    currently 1024 cells in the implementation
  </text>

  <path d="M330 260 L210 260 L210 365" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="248" y="248" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="700" fill="#166534">
    yes
  </text>

  <rect x="25" y="365" width="370" height="175" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5"/>
  <text x="210" y="407" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="23" font-weight="700" fill="#166534">
    Exact path
  </text>
  <text x="210" y="442" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#14532d">
    clip the polygon against every
  </text>
  <text x="210" y="472" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#14532d">
    candidate cell, subtract interior rings,
  </text>
  <text x="210" y="502" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#14532d">
    and compute the cell result
  </text>

  <path d="M610 260 L730 260 L730 365" stroke="#334155" stroke-width="3" marker-end="url(#arrow)" fill="none"/>
  <text x="692" y="248" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" font-weight="700" fill="#1d4ed8">
    no
  </text>

  <rect x="545" y="365" width="370" height="175" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2.5"/>
  <text x="730" y="405" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="23" font-weight="700" fill="#1d4ed8">
    Hybrid path
  </text>
  <text x="730" y="441" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#1e3a8a">
    1. mark boundary cells crossed by
  </text>
  <text x="730" y="471" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#1e3a8a">
    ring segments
  </text>
  <text x="730" y="501" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#1e3a8a">
    2. fill interior scanline spans, then
  </text>
  <text x="730" y="531" text-anchor="middle" font-family="DejaVu Sans, sans-serif" font-size="18" fill="#1e3a8a">
    3. clip boundary cells exactly
  </text>
</svg>
